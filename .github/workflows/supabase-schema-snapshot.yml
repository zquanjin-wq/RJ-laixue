name: Weekly Supabase Schema Snapshot

# 每周日 0 点（UTC）自动导出 Supabase 数据库 schema。
# 也可以手动触发（Actions 页面 → Run workflow）。
#
# 依赖 3 个 GitHub Repository Secret（Settings → Secrets and variables → Actions）：
#   - SUPABASE_PROJECT_REF : 项目 ref（Supabase Dashboard → Project Settings → General）
#   - SUPABASE_ACCESS_TOKEN: 个人 access token（https://supabase.com/dashboard/account/tokens）
#   - SUPABASE_DB_PASSWORD : 数据库密码（Project Settings → Database → Connection string）
#
# 工作原理：装 supabase CLI → link 项目 → 跑 db dump → 自动开 PR 修改 snapshot 文件

on:
  schedule:
    # 每周日 0:00 UTC（约北京时间 8:00）
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      reason:
        description: '可选说明（会写进 PR body）'
        required: false
        type: string

concurrency:
  group: schema-snapshot
  cancel-in-progress: false  # 让正在跑的 dump 跑完

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    name: Dump & PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Dump schema (public schema only)
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db dump \
            --schema public \
            --file supabase-schema-snapshot.sql

      - name: Dump roles
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db dump \
            --schema public \
            --role-only \
            --file supabase-roles-snapshot.sql || \
            echo "::warning::role-only dump failed (may not have superuser access), skipping"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet supabase-schema-snapshot.sql supabase-roles-snapshot.sql 2>/dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No schema changes since last snapshot"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema changed — will open PR"
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: 定期更新 Supabase schema snapshot

            自动从 Supabase 生产/预览环境重新导出 schema。
            请 review diff 后合并——如果 diff 来自你不知道的改动，
            立即在 #supabase 频道报警。
          branch: chore/schema-snapshot
          delete-branch: true
          title: 'chore: 定期更新 Supabase schema snapshot'
          body: |
            ## Supabase Schema 自动 Dump

            **触发方式**：${{ github.event_name == 'workflow_dispatch' && '手动触发' || '每周日 0:00 UTC 定时' }}
            **运行时间**：${{ github.run_id }}
            **Commit**：${{ github.sha }}

            ${{ github.event.inputs.reason && '> 触发说明：' + github.event.inputs.reason || '' }}

            ### 改动文件

            - `supabase-schema-snapshot.sql` — 完整 schema dump（public schema）
            - `supabase-roles-snapshot.sql` — 角色与权限信息

            ### Review checklist

            - [ ] diff 里所有改动都在预期内（你自己做的 migration）
            - [ ] 没看到陌生的 `CREATE TABLE` / `DROP TABLE` / `ALTER ... RLS`
            - [ ] RLS 策略数量没有异常减少
            - [ ] 合并后 Supabase Dashboard 已确认应用

            > ⚠️ 如果 diff 里出现不认识的改动，**先不要合并**——
            > 立即在团队群里报警，可能有人/脚本改了 production DB
            > 但忘记写 migration 文件。